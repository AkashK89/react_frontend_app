name: Deploy Frontend (WIF)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for WIF

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build project
      - name: Build
        run: npm run build

      # 5️⃣ Authenticate to GCP via WIF
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528370594078/locations/global/workloadIdentityPools/github-frontend-pool/providers/github-frontend-provider
          service_account: github-ci@luminx-494015.iam.gserviceaccount.com

      # 6️⃣ Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 7️⃣ Deploy to GCS
      - name: Deploy to GCS
        run: |
          gcloud storage rsync dist/ gs://luminx-frontend-builds/$GITHUB_SHA --recursive
